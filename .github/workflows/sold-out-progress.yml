name: Sold Out Progress

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sold-out-progress

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - run: |
          percent=$(./scripts/sold-out-progress.sh)
          # Etc/GMT-2 is UTC+2 (POSIX inverts the sign) and has no DST, so the
          # column stays on a fixed offset whatever the runner's clock is set to.
          fetched_at=$(TZ='Etc/GMT-2' date '+%Y-%m-%dT%H:%M:%S+02:00')
          echo "${fetched_at},${percent}" >> sold-out-progress.csv

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sold-out-progress.csv
          git commit -m "sold-out progress ${fetched_at}: ${percent}%"
          git pull --rebase origin main
          git push origin HEAD:main
